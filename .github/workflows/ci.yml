name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: YanXuLang/yanxu
          path: .yanxu
          ref: v1.1.6
      - name: Build Yanxu 1.1.6
        run: cargo build --manifest-path .yanxu/Cargo.toml --locked --bin yanxu
      - name: Check, test and compile
        run: |
          .yanxu/target/debug/yanxu 包 锁 .
          .yanxu/target/debug/yanxu 查 src/言舟.yx
          .yanxu/target/debug/yanxu 试 tests --json
          .yanxu/target/debug/yanxu 编 . -o "$RUNNER_TEMP/yanxu-sqlite.yxb"
